<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPRO | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            font-family: sans-serif;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%; 
            max-width: 400px; 
            padding: 2rem; 
            border-radius: 2rem; 
        }
    </style>
</head>
<body>

<div class="glass-card shadow-2xl">
    <div class="flex items-center justify-center gap-2 mb-6">
        <div class="bg-blue-600 p-2 rounded-lg">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
            </svg>
        </div>
        <h1 class="text-xl font-bold text-white tracking-wider">INVESTOR<span class="text-blue-500">PRO</span></h1>
    </div>

    <div class="text-center mb-8">
        <h3 class="text-white font-semibold text-lg">Secure Financial Growth</h3>
        <p class="text-slate-400 text-sm mt-2">Professional portfolio management and verified investment opportunities tailored for you.</p>
        <div class="flex justify-center gap-3 mt-4">
            <span class="px-3 py-1 bg-blue-900/30 text-blue-300 text-[10px] rounded-full border border-blue-800 uppercase tracking-wide">CMA Licensed</span>
        </div>
    </div>

    <form id="signupForm" class="space-y-4">
        <input type="text" id="username" required placeholder="Username" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none focus:border-blue-500">
        
        <input type="email" id="email" required placeholder="Email Address" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none focus:border-blue-500">
        
        <div class="flex items-center bg-slate-900/50 rounded-xl border border-slate-700 overflow-hidden">
            <span class="px-4 py-4 text-white font-medium border-r border-slate-700">🇺🇬 +256</span>
            <input type="tel" id="phone" required placeholder="7XX XXX XXX" class="w-full p-4 bg-transparent text-white outline-none">
        </div>

        <input type="password" id="password" required placeholder="Create Password" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none focus:border-blue-500">
        
        <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold hover:opacity-90 transition">Register Now</button>
    </form>

    <div class="mt-8 text-center space-y-4">
        <a href="index.html" class="block text-sm text-blue-400 hover:text-white transition">Have an account? Login</a>
        <div class="border-t border-slate-800 pt-6">
            <p class="text-[10px] text-slate-600 uppercase tracking-widest">InvestorPRO Financial Services Ltd &copy; 2026</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabase = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indib2RwZmJtaWxocGVyY2NnemVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODAwMDIsImV4cCI6MjA4ODY1NjAwMn0.2hNY3hnYxMRZBrosVHnfID5jdCjQ3BLh7JfvLB7kBoA);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value;
        const phone = document.getElementById('phone').value;

        const { error } = await supabase.auth.signUp({
            email, password,
            options: { data: { username, phone } }
        });

        if (error) alert("Error: " + error.message);
        else alert("Registration successful! Check your email to confirm.");
    });
</script>
</body>
</html>
