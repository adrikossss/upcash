<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor | Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 font-sans pb-20">

    <header class="flex items-center justify-between p-5 sticky top-0 bg-slate-900/50 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="trending-up" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">INVESTOR<span class="text-blue-500">PRO</span></h1>
        </div>
        <button onclick="handleLogout()" class="p-2 hover:bg-red-500/10 rounded-full transition-colors">
            <i data-lucide="log-out" class="w-5 h-5 text-slate-400"></i>
        </button>
    </header>

    <main class="p-4 max-w-lg mx-auto space-y-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-slate-400 text-sm">Welcome back,</p>
                <h2 class="text-xl font-semibold" id="username">Loading...</h2>
            </div>
            <div class="bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-xs font-medium border border-green-500/20">
                Verified
            </div>
        </div>

        <div class="rounded-3xl p-6 relative overflow-hidden shadow-2xl border border-white/10" style="background: linear-gradient(135deg, #2563eb, #7c3aed);">
            <div class="relative z-10">
                <p class="text-blue-100/80 text-sm font-medium mb-1">Available Balance</p>
                <h3 class="text-4xl font-black mb-6">UGX <span id="balance">0</span></h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-3">
                        <p class="text-xs text-blue-100/60 uppercase">Total Investment</p>
                        <p class="font-bold text-lg" id="totalInv">UGX 0</p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-3">
                        <p class="text-xs text-blue-100/60 uppercase">Total Withdrawn</p>
                        <p class="font-bold text-lg" id="totalWith">UGX 0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="flex items-center justify-center gap-2 bg-slate-100 text-slate-900 font-bold py-4 rounded-2xl hover:bg-white transition active:scale-95">
                <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i> Deposit
            </button>
            <button class="flex items-center justify-center gap-2 glass-card font-bold py-4 rounded-2xl hover:bg-slate-800 transition active:scale-95 border-white/20">
                <i data-lucide="arrow-up-from-line" class="w-5 h-5 text-purple-400"></i> Withdraw
            </button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Connection
        const supabase = supabase.createClient(
            'https://wbodpfbmilhperccgzei.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indib2RwZmJtaWxocGVyY2NnemVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODAwMDIsImV4cCI6MjA4ODY1NjAwMn0.2hNY3hnYxMRZBrosVHnfID5jdCjQ3BLh7JfvLB7kBoA'
        );

        async function loadDashboard() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { window.location.href = "auth.html"; return; }

            const { data, error } = await supabase
                .from('UserdataTab')
                .select('username, Available_balance, Total_investment, Total_withdrawn')
                .eq('user_id', user.id)
                .single();

            if (data) {
                document.getElementById('username').innerText = data.username || "Investor";
                document.getElementById('balance').innerText = Number(data.Available_balance).toLocaleString();
                document.getElementById('totalInv').innerText = "UGX " + Number(data.Total_investment).toLocaleString();
                document.getElementById('totalWith').innerText = "UGX " + Number(data.Total_withdrawn).toLocaleString();
            }
            
            // Re-initialize icons after content loads
            lucide.createIcons();
        }

        function handleLogout() {
            supabase.auth.signOut().then(() => { window.location.href = "auth.html"; });
        }

        // Initialize on load
        loadDashboard();
    </script>
</body>
</html>
