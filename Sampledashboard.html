<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-btn { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
    </style>
</head>
<body class="p-4 md:p-6 max-w-lg mx-auto">

    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg"><i data-lucide="trending-up" class="w-4 h-4"></i></div>
            <h1 class="font-bold tracking-tighter text-lg">UPCASH</h1>
        </div>
        <div class="flex items-center gap-3">
            <i data-lucide="user-circle" class="w-8 h-8 text-slate-400"></i>
            <button onclick="handleLogout()" class="text-slate-400 hover:text-red-400"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </div>
    </header>

    <section class="glass-card rounded-2xl p-5 mb-6 bg-gradient-to-br from-blue-900/40 to-indigo-900/40 border border-white/10">
        <p class="text-blue-200 text-xs uppercase font-semibold">Available Balance</p>
        <h2 class="text-3xl font-black mb-4" id="balanceDisplay">UGX 0</h2>
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-black/20 p-2.5 rounded-xl"><p class="text-[9px] text-slate-400 uppercase">Invested</p><p class="font-bold text-sm" id="invDisplay">UGX 0</p></div>
            <div class="bg-black/20 p-2.5 rounded-xl"><p class="text-[9px] text-slate-400 uppercase">Withdrawn</p><p class="font-bold text-sm" id="withDisplay">UGX 0</p></div>
        </div>
    </section>
<div class="grid grid-cols-2 gap-3 mb-6">
    <button class="gradient-btn font-bold py-3 px-4 rounded-xl text-sm flex items-center justify-center gap-2 hover:opacity-90 transition">
        <i data-lucide="arrow-down-to-line" class="w-4 h-4"></i> Deposit
    </button>
    <button class="glass-card font-bold py-3 px-4 rounded-xl text-sm flex items-center justify-center gap-2 border-white/10 hover:bg-white/10 transition">
        <i data-lucide="arrow-up-from-line" class="w-4 h-4"></i> Withdraw
    </button>
</div>

    

    <div class="flex gap-3 mb-8">
        <button class="glass-card flex-1 py-2 rounded-xl text-[11px] font-bold flex items-center justify-center gap-2">
            <i data-lucide="copy" class="w-3 h-3"></i>  Referral link
        </button>
        <button class="bg-[#25D366]/20 text-[#25D366] px-4 rounded-xl font-bold text-[11px] flex items-center gap-2">
            <i data-lucide="message-circle" class="w-3 h-3"></i> WhatsApp
        </button>
    </div>

    <h3 class="text-sm font-bold mb-3 flex items-center gap-2"><i data-lucide="briefcase" class="w-4 h-4 text-blue-400"></i> Investment Plans</h3>
    <div class="glass-card rounded-2xl p-1">
        <table class="w-full text-center text-[11px]">
            <thead><tr class="text-slate-400 border-b border-white/5"><th class="p-3">Plan</th><th class="p-3">ROI</th><th class="p-3">Days</th></tr></thead>
            <tbody class="divide-y divide-white/5">
                <tr><td class="p-3 font-bold">Basic</td><td class="p-3">10%</td><td class="p-3">3</td></tr>
                <tr><td class="p-3 font-bold">Silver</td><td class="p-3">25%</td><td class="p-3">7</td></tr>
                <tr><td class="p-3 font-bold">Gold</td><td class="p-3">50%</td><td class="p-3">15</td></tr>
                <tr><td class="p-3 font-bold">Diamond</td><td class="p-3">100%</td><td class="p-3">30</td></tr>
                <tr><td class="p-3 font-bold">VIP</td><td class="p-3">200%</td><td class="p-3">60</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Trigger Icon Rendering
        lucide.createIcons();

        const supabaseClient = supabase.createClient('YOUR_URL', 'YOUR_KEY');
        
        async function loadDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'signin.html';

            const { data } = await supabaseClient.from('userinfo').select('*').eq('id', user.id).single();
            if (data) {
                document.getElementById('balanceDisplay').innerText = `UGX ${data.available_balance?.toLocaleString() || 0}`;
                document.getElementById('invDisplay').innerText = `UGX ${data.total_investment?.toLocaleString() || 0}`;
                document.getElementById('withDisplay').innerText = `UGX ${data.total_withdrawn?.toLocaleString() || 0}`;
            }
        }

        function handleLogout() { supabaseClient.auth.signOut().then(() => window.location.href = 'signin.html'); }
        window.onload = loadDashboard;
    
    </script>
</body>
</html>
