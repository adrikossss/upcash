<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
            <h1 class="text-xl font-bold">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <i data-lucide="user-circle" class="w-8 h-8 text-slate-400"></i>
            <span id="usernameDisplay" class="font-medium text-sm">Loading...</span>
            <button onclick="handleLogout()" class="text-red-400 hover:text-red-300"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </div>
    </header>

    <section class="glass-card rounded-3xl p-6 mb-6 bg-gradient-to-r from-blue-700 to-indigo-800 border-0">
        <p class="text-blue-200 text-sm">Available Balance</p>
        <h2 class="text-4xl font-black mb-6" id="balanceDisplay">UGX 0</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/10 p-3 rounded-2xl"><p class="text-[10px] uppercase">Total Invested</p><p class="font-bold" id="invDisplay">UGX 0</p></div>
            <div class="bg-white/10 p-3 rounded-2xl"><p class="text-[10px] uppercase">Total Withdrawn</p><p class="font-bold" id="withDisplay">UGX 0</p></div>
        </div>
    </section>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="window.location.href='deposit.html'" class="bg-white text-blue-900 font-bold py-4 rounded-2xl hover:bg-blue-50 transition">Deposit</button>
        <button onclick="window.location.href='withdraw.html'" class="glass-card font-bold py-4 rounded-2xl hover:bg-white/10 transition">Withdraw</button>
    </div>

    <button class="w-full glass-card p-4 rounded-2xl flex items-center gap-3 mb-8 hover:border-blue-500 transition">
        <i data-lucide="copy" class="text-blue-400"></i> Copy Referral Link
    </button>

    <h3 class="text-lg font-bold mb-4">Investment Plans</h3>
    <div class="glass-card rounded-2xl overflow-hidden">
        <table class="w-full text-left text-sm">
            <thead class="bg-black/20 text-slate-400"><tr><th class="p-4">Plan</th><th class="p-4">ROI</th></tr></thead>
            <tbody id="plansBody">
                </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient('YOUR_URL', 'YOUR_KEY');
        
        async function loadDashboard() {
            lucide.createIcons();
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'signin.html';

            const { data, error } = await supabaseClient.from('userinfo').select('*').eq('id', user.id).single();
            if (data) {
                document.getElementById('usernameDisplay').innerText = data.username;
                document.getElementById('balanceDisplay').innerText = `UGX ${data.available_balance?.toLocaleString()}`;
                document.getElementById('invDisplay').innerText = `UGX ${data.total_investment?.toLocaleString()}`;
                document.getElementById('withDisplay').innerText = `UGX ${data.total_withdrawn?.toLocaleString()}`;
            }
        }

        function handleLogout() { supabaseClient.auth.signOut().then(() => window.location.href = 'signin.html'); }
        window.onload = loadDashboard;
    </script>
</body>
</html>
