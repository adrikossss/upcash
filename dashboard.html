<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor | Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: radial-gradient(circle at top left, #1e293b, #0f172a); min-height: 100vh; color: #e2e8f0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; color: white; }
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="font-sans pb-20">

    <header class="flex items-center justify-between p-5 sticky top-0 bg-slate-900/50 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="trending-up" class="text-white w-5 h-5"></i></div>
            <h1 class="text-xl font-bold tracking-tight">UP<span class="text-blue-500">CASH</span></h1>
          
        </div>
        <div class="flex items-center gap-2">
            <button onclick="handleLogout()" class="p-2 hover:bg-red-500/10 rounded-full"><i data-lucide="log-out" class="w-5 h-5 text-slate-400"></i></button>
            <button class="p-2 hover:bg-slate-800 rounded-full"><i data-lucide="user-circle" class="w-6 h-6 text-slate-400"></i></button>
        </div>
    </header>
<div class="px-5 py-4 max-w-lg mx-auto">
    <p class="text-slate-400 text-sm font-medium">
        Welcome back, <span class="text-gradient font-bold" id="username">User</span>
    </p>
</div>

    <main class="p-4 max-w-lg mx-auto space-y-6">
        <div class="rounded-3xl p-6 shadow-2xl border border-white/10" style="background: linear-gradient(135deg, #2563eb, #7c3aed);">
            <p class="text-blue-100/80 text-sm font-medium mb-1">Available Balance</p>
            <h3 class="text-4xl font-black mb-6">UGX <span id="balance">0</span></h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-3">
                    <p class="text-xs text-blue-100/60 uppercase">Total Investment</p>
                    <p class="font-bold text-lg" id="totalInv">UGX 0</p>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-3">
                    <p class="text-xs text-blue-100/60 uppercase">Total Withdrawn</p>
                    <p class="font-bold text-lg" id="totalWith">UGX 0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="btn-gradient font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-sm"><i data-lucide="arrow-down-to-line" class="w-4 h-4"></i> Deposit</button>
            <button class="glass-card font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-sm border-white/20"><i data-lucide="arrow-up-from-line" class="w-4 h-4 text-purple-400"></i> Withdraw</button>
            <button onclick="copyLink()" class="glass-card font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-sm border-white/20"><i data-lucide="copy" class="w-4 h-4 text-blue-400"></i> Copy Link</button>
            <a href="https://chat.whatsapp.com/HEusxMonb275LAHnJbooY2" target="_blank" class="bg-[#25D366]/20 border border-[#25D366]/30 font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-sm text-[#25D366]">
                <i data-lucide="message-circle" class="w-4 h-4"></i> Community
            </a>
        </div>

        <h4 class="text-lg font-bold flex items-center gap-2 text-gradient"><i data-lucide="briefcase" class="w-5 h-5"></i> Investment Plans</h4>
        <div class="glass-card rounded-2xl overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-white/5 text-slate-400 text-xs uppercase">
                    <tr><th class="p-4">Plan</th><th class="p-4 text-center">ROI</th><th class="p-4 text-center">Days</th><th class="p-4 text-right">Min</th></tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <tr><td class="p-4 font-bold text-blue-400">Silver</td><td class="p-4 text-center">15%</td><td class="p-4 text-center">7</td><td class="p-4 text-right font-medium">50k</td></tr>
                    <tr><td class="p-4 font-bold text-purple-400">Gold</td><td class="p-4 text-center">40%</td><td class="p-4 text-center">30</td><td class="p-4 text-right font-medium">200k</td></tr>
                    <tr><td class="p-4 font-bold text-pink-400">Diamond</td><td class="p-4 text-center">100%</td><td class="p-4 text-center">90</td><td class="p-4 text-right font-medium">1M</td></tr>
                    <tr><td class="p-4 font-bold text-orange-400">VIP</td><td class="p-4 text-center">250%</td><td class="p-4 text-center">180</td><td class="p-4 text-right font-medium">5M</td></tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-center pt-4">
            <a href="mailto:admin@investorpro.com" class="text-slate-500 hover:text-purple-400 transition">
                <i data-lucide="mail" class="w-5 h-5"></i>
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'YOUR_KEY');

        async function loadDashboard() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = "auth.html";

            const { data } = await supabase.from('UserdataTab').select('*').eq('user_id', user.id).single();
            if (data) {
                document.getElementById('balance').innerText = Number(data.Available_balance || 0).toLocaleString();
                document.getElementById('totalInv').innerText = "UGX " + Number(data.Total_investment || 0).toLocaleString();
                document.getElementById('totalWith').innerText = "UGX " + Number(data.Total_withdrawn || 0).toLocaleString();
            }
            
            // Initialize icons here to ensure they always load
            lucide.createIcons();
        }

        function copyLink() { alert("Link copied!"); }
        function handleLogout() { supabase.auth.signOut().then(() => window.location.href = "auth.html"); }
        window.onload = loadDashboard;
        // Force Icon Refresh
window.addEventListener('load', function() {
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
});

    </script>
</body>
</html>
