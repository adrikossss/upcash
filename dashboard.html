<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Initialize using supabaseClient
    const supabaseClient = supabase.createClient(
        'https://wbodpfbmilhperccgzei.supabase.co', 
        'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN' // Replace with your actual anon/public key
    );

    async function checkAuthAndLoad() {
        // 1. Get current session
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        // 2. Redirect to auth page if no session is detected
        if (!session) {
            window.location.href = "auth.html";
            return;
        }

        const userId = session.user.id;
        
        // 3. Fetch data matching your database columns and userid column
        const { data, error: fetchError } = await supabaseClient
            .from('userinfo')
            .select('username, available_balance, total_investment, total_withdrawn')
            .eq('userid', userId) // Updated to match your 'userid' column
            .single();

        if (fetchError) {
            console.error("Error fetching data:", fetchError.message);
            return;
        }

        // 4. Update the UI
        if (data) {
            document.getElementById('username').innerText = data.username || "User";
            document.getElementById('balance').innerText = Number(data.available_balance || 0).toLocaleString();
            document.getElementById('totalInv').innerText = "UGX " + Number(data.total_investment || 0).toLocaleString();
            document.getElementById('totalWith').innerText = "UGX " + Number(data.total_withdrawn || 0).toLocaleString();
        }
    }

    function copyLink() { alert("Referral link copied!"); }
    
    function handleLogout() { 
        supabaseClient.auth.signOut().then(() => {
            window.location.href = "sign.html";
        }); 
    }

    window.onload = checkAuthAndLoad;
</script>
