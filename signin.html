<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPRO | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'Inter', sans-serif; }
        .vault-card { background: #0f172a; border: 1px solid #1e293b; width: 100%; max-width: 420px; padding: 3rem 2rem; border-radius: 0.5rem; }
    </style>
</head>
<body>

<div class="vault-card shadow-2xl">
    <div class="mb-10 text-center">
        <div class="flex items-center justify-center gap-1.5 mb-3">
            <h1 class="text-xl font-bold text-white tracking-widest uppercase">InvestorPRO</h1>
            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
        </div>
        <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em]">Secure Investment Portal</p>
    </div>

    <form id="signinForm" class="space-y-6">
        <div>
            <input type="email" id="email" required placeholder="topinvestor@gmail.com" class="w-full bg-transparent border-b border-slate-700 py-3 text-white outline-none focus:border-blue-500 transition-all placeholder:text-slate-600 text-sm">
        </div>
        <div>
            <input type="password" id="password" required placeholder="Enter Password" class="w-full bg-transparent border-b border-slate-700 py-3 text-white outline-none focus:border-blue-500 transition-all placeholder:text-slate-600 text-sm">
        </div>
        
        <button type="button" id="submitBtn" class="w-full py-3.5 mt-4 bg-white text-slate-950 font-bold text-sm uppercase tracking-widest hover:bg-blue-500 hover:text-white transition-all">Sign In</button>
    </form>

    <div class="mt-8 flex justify-between items-center text-[11px] text-slate-500">
        <a href="#" class="hover:text-blue-400 uppercase tracking-wider">Forgot?</a>
        <a href="index.html" class="hover:text-blue-400 uppercase tracking-wider font-bold text-slate-300">Create Account</a>
    </div>

    <div class="mt-12 text-center">
        <a href="mailto:topinvestor@gmail.com" class="text-slate-700 hover:text-slate-500 transition">
            <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </a>
    </div>
</div>

</body>
</html>
