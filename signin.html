<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPRO | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 2rem; }
        input::placeholder { color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="glass-card shadow-2xl">
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2 mb-4">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <h1 class="text-xl font-bold text-white tracking-wider">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <h2 class="text-lg font-semibold text-white">Welcome back</h2>
        <p class="text-sm text-slate-400 mt-1">Automated Instant Withdraws and Deposits.</p>
    </div>

    <form id="signinForm" class="space-y-5">
        <div>
            <input type="email" id="email" required placeholder="topinvestor@gmail.com" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none focus:border-blue-500 transition">
        </div>
        <div>
            <input type="password" id="password" required placeholder="••••••••" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none focus:border-blue-500 transition">
        </div>
        
        <button type="button" id="submitBtn" class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold hover:opacity-90 transition shadow-lg shadow-blue-900/20">Sign In</button>
    </form>

    <div class="mt-6 text-center space-y-3">
        <a href="#" class="text-sm text-slate-400 hover:text-blue-400 transition">Forgot password?</a>
        <p class="text-sm text-slate-500">Don't have an account? 
            <a href="index.html" class="text-blue-500 font-bold hover:underline">Create account</a>
        </p>
    </div>

    <div class="mt-8 pt-6 border-t border-slate-800 text-center">
        <a href="mailto:topinvestor@gmail.com" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-400 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-xs">Contact support</span>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Remember to replace these with your actual project keys from Supabase
    const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Login Failed: " + error.message);
        } else {
            alert("Login successful!");
            window.location.href = "dashboard.html";
        }
    });
</script>
</body>
</html>
