<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPRO | Secure Investment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0b1120 0%, #171738 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 1.5rem; }
    </style>
</head>
<body>

<div class="glass-card shadow-2xl">
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2 mb-3">
            <h1 class="text-2xl font-bold text-white">InvestorPRO</h1>
            <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
        </div>
        <p class="text-slate-400 text-sm">Your secure investment platform.</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="flex flex-col items-center p-3 bg-slate-900/50 rounded-xl border border-slate-800">
            <svg class="w-5 h-5 text-blue-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <span class="text-[10px] text-slate-400 font-semibold uppercase">Secure</span>
        </div>
        <div class="flex flex-col items-center p-3 bg-slate-900/50 rounded-xl border border-slate-800">
            <svg class="w-5 h-5 text-emerald-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="text-[10px] text-slate-400 font-semibold uppercase">Instant</span>
        </div>
    </div>

    <form id="signinForm" class="space-y-4">
        <input type="email" id="email" required placeholder="topinvestor@gmail.com" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 text-white outline-none focus:border-blue-500 transition">
        <input type="password" id="password" required placeholder="Enter your password" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 text-white outline-none focus:border-blue-500 transition">
        
        <button type="button" id="submitBtn" class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold transition">Sign In</button>
    </form>

    <div class="mt-6 flex justify-between text-xs text-slate-500">
        <a href="#" class="hover:text-blue-400">Forgot password?</a>
        <a href="index.html" class="font-bold text-blue-500 hover:underline">Create account</a>
    </div>

    <div class="mt-10 pt-6 border-t border-slate-800 text-center">
        <a href="mailto:topinvestor@gmail.com" class="inline-flex items-center gap-2 text-slate-600 hover:text-slate-400 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-[10px]">Contact Support</span>
        </a>
    </div>
</div>

<script>
    // Integration logic remains: supabase.auth.signInWithPassword(...)
</script>
</body>
</html>
