<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPRO | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0b1120 0%, #171738 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); width: 100%; max-width: 420px; padding: 2.5rem; border-radius: 1.5rem; }
        input::placeholder { color: #475569; }
    </style>
</head>
<body>

<div class="glass-card shadow-2xl">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center p-3 bg-blue-500/10 rounded-2xl mb-4">
            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
        <p class="text-slate-400 text-sm mt-1">Please sign in to access your secure investor dashboard.</p>
    </div>

    <form id="signinForm" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">Email Address</label>
            <input type="email" id="email" required placeholder="topinvestor@gmail.com" class="w-full p-4 rounded-xl bg-slate-950/50 border border-slate-800 text-white outline-none focus:border-blue-500 transition">
        </div>
        <div>
            <div class="flex justify-between mb-2">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest">Password</label>
                <a href="#" class="text-xs text-blue-500 hover:text-blue-400 transition">Forgot Password?</a>
            </div>
            <input type="password" id="password" required placeholder="••••••••" class="w-full p-4 rounded-xl bg-slate-950/50 border border-slate-800 text-white outline-none focus:border-blue-500 transition">
        </div>
        
        <button type="button" id="submitBtn" class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold transition duration-300">Sign In Securely</button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-800 text-center">
        <p class="text-sm text-slate-500">New to InvestorPRO? 
            <a href="index.html" class="text-white font-semibold hover:text-blue-400 transition ml-1">Create Account</a>
        </p>
    </div>
</div>

<script>
    // Integration logic stays the same...
</script>
</body>
</html>
