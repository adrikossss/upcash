<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hidden { display: none; }
    </style>
</head>
<body class="text-slate-200 p-6">

    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-blue-600 p-3 rounded-2xl mb-3 shadow-lg shadow-blue-500/20">
                <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">INVESTOR<span class="text-blue-500">PRO</span></h1>
            <p class="text-slate-400 text-sm">Secure Institutional Access</p>
        </div>

        <div class="glass-card rounded-3xl p-8 shadow-2xl">
            
            <div id="login-form">
                <h2 class="text-xl font-bold mb-6">Welcome Back</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Email Address</label>
                        <input type="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="name@example.com">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Password</label>
                        <input type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
                    </div>
                    <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition active:scale-95 shadow-lg shadow-blue-600/20">
                        Sign In
                    </button>
                </div>
                <p class="mt-6 text-center text-sm text-slate-400">
                    Don't have an account? 
                    <button onclick="toggleAuth()" class="text-blue-400 font-bold hover:underline">Sign Up</button>
                </p>
            </div>

            <div id="signup-form" class="hidden">
                <h2 class="text-xl font-bold mb-6">Create Account</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Full Name</label>
                        <input type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Email Address</label>
                        <input type="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="name@example.com">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Password</label>
                        <input type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
                    </div>
                    <button class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 rounded-xl transition active:scale-95 shadow-lg">
                        Create Account
                    </button>
                </div>
                <p class="mt-6 text-center text-sm text-slate-400">
                    Already registered? 
                    <button onclick="toggleAuth()" class="text-blue-400 font-bold hover:underline">Log In</button>
                </p>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleAuth() {
            const login = document.getElementById('login-form');
            const signup = document.getElementById('signup-form');
            
            login.classList.toggle('hidden');
            signup.classList.toggle('hidden');
        }
    </script>
</body>
              </html>
