<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPRO | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: radial-gradient(circle at top right, #0f172a, #1e1b4b); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <header class="w-full max-w-md flex items-center justify-between py-8">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="trending-up" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">INVESTOR<span class="text-blue-500">PRO</span></h1>
        </div>
        <div class="bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-xs font-medium border border-green-500/20">Verified</div>
    </header>

    <div class="glass-card p-8 rounded-3xl w-full max-w-md shadow-2xl fade-in">
        <div class="text-center mb-8">
            <h2 id="title" class="text-2xl font-bold text-white">Welcome Back</h2>
            <p class="text-slate-400 text-sm">Professional investment management</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div id="usernameGroup" class="relative hidden">
                <i data-lucide="user" class="absolute left-3 top-3.5 w-5 h-5 text-slate-500"></i>
                <input type="text" id="username" placeholder="Username" class="w-full bg-slate-900/50 border border-white/10 p-3 pl-10 rounded-xl text-white outline-none focus:border-blue-500">
            </div>

            <div class="relative">
                <i data-lucide="mail" class="absolute left-3 top-3.5 w-5 h-5 text-slate-500"></i>
                <input type="email" id="email" required placeholder="Email Address" class="w-full bg-slate-900/50 border border-white/10 p-3 pl-10 rounded-xl text-white outline-none focus:border-blue-500">
            </div>

            <div id="phoneGroup" class="relative hidden">
                <div class="absolute left-3 top-3.5 flex items-center gap-2 border-r border-slate-700 pr-2">
                    <span class="text-lg">🇺🇬</span> <span class="text-slate-300 font-medium">+256</span>
                </div>
                <input type="tel" id="phone" placeholder=" 7XX XXX XXX" class="w-full bg-slate-900/50 border border-white/10 p-3 pl-20 rounded-xl text-white outline-none focus:border-blue-500">
            </div>
            
            <div class="relative">
                <i data-lucide="lock" class="absolute left-3 top-3.5 w-5 h-5 text-slate-500"></i>
                <input type="password" id="password" required placeholder="Password" class="w-full bg-slate-900/50 border border-white/10 p-3 pl-10 rounded-xl text-white outline-none focus:border-blue-500">
            </div>

            <button type="submit" id="mainBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold hover:opacity-90 transition active:scale-95 text-white">
                Sign In
            </button>
        </form>

        <div class="mt-6 flex justify-between text-xs text-slate-400">
            <button onclick="toggleMode()" id="toggleBtn" class="hover:text-white transition">Create an account</button>
            <button class="hover:text-white transition">Forgot Password?</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();
        let isLogin = true;

         // INSERT YOUR KEYS HERE
    const supabase = supabase.createClient('https://your-project-id.supabase.co', 'your-anon-key');

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "Welcome Back" : "Create Account";
        document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Register Now";
        document.getElementById('toggleBtn').innerText = isLogin ? "Create an account" : "Have an account? Login";
        document.getElementById('phoneGroup').classList.toggle('hidden', isLogin);
        document.getElementById('usernameGroup').classList.toggle('hidden', isLogin);
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const username = document.getElementById('username').value;

        if (isLogin) {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { alert(error.message); } else { window.location.href = "index.html"; }
        } else {
            const { error } = await supabase.auth.signUp({ 
                email: email, 
                password: password,
                options: { data: { phone_number: phone, username: username } } 
            });
            if (error) { alert(error.message); } else { alert("Check your email!"); }
        }
    });
    </script>
</body>
</html>
