<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPRO | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .auth-card { 
            background: #0f172a; 
            border: 1px solid #334155; 
            width: 100%; 
            max-width: 400px; 
            padding: 2rem; 
            border-radius: 2rem; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden-element { display: none; }
    </style>
</head>
<body>

<div class="auth-card shadow-2xl">
    <div class="flex items-center justify-center gap-2 mb-8">
        <div class="bg-blue-600 p-2 rounded-lg">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
        </div>
        <h1 class="text-xl font-bold text-white">INVESTOR<span class="text-blue-500">PRO</span></h1>
    </div>

    <h2 id="formTitle" class="text-white text-2xl font-bold text-center mb-6">Welcome Back</h2>

    <form id="authForm" class="space-y-4">
        <div id="extraFields" class="hidden-element space-y-4">
            <input type="text" placeholder="Username" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500">
            <div class="flex items-center bg-slate-900 border border-slate-700 rounded-xl overflow-hidden">
                <span class="px-4 py-4 text-slate-400 border-r border-slate-700">🇺🇬 +256</span>
                <input type="tel" placeholder="7XXXXXXXX" class="w-full p-4 bg-transparent text-white outline-none">
            </div>
        </div>

        <input type="email" placeholder="Email Address" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500">
        <input type="password" placeholder="Password" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500">
        
        <button id="mainBtn" class="w-full py-4 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition">Sign In</button>
    </form>

    <div class="mt-6 text-center">
        <button id="toggleBtn" class="text-sm text-blue-400 hover:text-white transition">Create an account</button>
        <p class="mt-4 text-xs text-slate-500">Forgot Password?</p>
    </div>
</div>

<script>
    const toggleBtn = document.getElementById('toggleBtn');
    const formTitle = document.getElementById('formTitle');
    const mainBtn = document.getElementById('mainBtn');
    const extraFields = document.getElementById('extraFields');
    
    let isLogin = true;

    toggleBtn.addEventListener('click', () => {
        isLogin = !isLogin;
        
        // Morph text
        formTitle.innerText = isLogin ? "Welcome Back" : "Create Account";
        mainBtn.innerText = isLogin ? "Sign In" : "Register Now";
        toggleBtn.innerText = isLogin ? "Create an account" : "Have an account? Login";
        
        // Toggle view
        if(isLogin) {
            extraFields.classList.add('hidden-element');
        } else {
            extraFields.classList.remove('hidden-element');
        }
    });
</script>
</body>
    </html>
