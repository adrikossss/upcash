<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 420px; padding: 2rem; border-radius: 2rem; }
        .input-group { position: relative; }
        .input-icon { position: absolute; left: 1rem; top: 1rem; color: #64748b; }
        .field { width: 100%; padding: 0.75rem 0.75rem 0.75rem 3rem; border-radius: 0.75rem; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; color: white; outline: none; transition: all 0.3s; }
        .status-msg { font-size: 0.75rem; margin-top: 0.25rem; height: 1.2rem; }
        .input-error { border: 1px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05) !important; }
        .input-success { border: 1px solid #22c55e !important; }
    </style>
</head>
<body>

<div class="glass-card shadow-2xl">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-white tracking-tight">UP<span class="text-blue-500">CASH</span></h1>
        <p class="text-slate-400 text-sm mt-1">Join our business platform</p>
    </div>

    <form id="signupForm" class="space-y-4">
        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <input type="text" id="username" required placeholder="Username" class="field">
            <div id="username-feedback" class="status-msg text-slate-400">Lowercase letters only.</div>
        </div>

        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <input type="email" id="email" required placeholder="Email" class="field">
        </div>

        <div class="input-group flex items-center">
            <span class="absolute left-3 text-slate-500 text-sm font-bold">+256</span>
            <input type="tel" id="phone" required placeholder="7XX XXX XXX" class="field" style="padding-left: 4.5rem;">
        </div>

        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <input type="password" id="password" required placeholder="Password" class="field">
        </div>

        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            <input type="password" id="confirmPassword" required placeholder="Confirm Password" class="field">
            <div id="pass-feedback" class="status-msg"></div>
        </div>

        <button type="submit" id="submitBtn" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold transition disabled:opacity-50">Register Now</button>
    </form>

    <div class="mt-6 text-center text-sm space-y-2">
        <a href="#" class="text-slate-400 hover:text-blue-400">Forgot password?</a>
        <p class="text-slate-500">Already have an account? <a href="signin.html" class="text-blue-500 font-bold hover:underline">Sign In</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabase = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');
    const form = document.getElementById('signupForm');
    const usernameInput = document.getElementById('username');
    const feedback = document.getElementById('username-feedback');
    const pass1 = document.getElementById('password');
    const pass2 = document.getElementById('confirmPassword');
    const passFeed = document.getElementById('pass-feedback');
    const submitBtn = document.getElementById('submitBtn');
    let debounceTimer;

    // Username Logic with strict sanitization
    usernameInput.addEventListener('input', (e) => {
        // 1. Strict Sanitization: Strip anything that isn't a lowercase letter
        const originalValue = e.target.value;
        const sanitized = originalValue.toLowerCase().replace(/[^a-z]/g, '');
        
        if (originalValue !== sanitized) {
            usernameInput.value = sanitized;
            feedback.innerText = "Only lowercase letters allowed.";
            feedback.style.color = "#ef4444";
        }

        const val = usernameInput.value;

        // 2. Length check
        if (val.length < 4) {
            feedback.innerText = val.length === 0 ? "Enter a username (min 4 chars)" : "Too short (min 4)";
            feedback.style.color = "#94a3b8";
            usernameInput.classList.remove('input-error', 'input-success');
            submitBtn.disabled = true;
            return;
        }

        // 3. Database Check
        feedback.innerText = "Checking availability...";
        feedback.style.color = "#eab308";
        
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            const { data, error } = await supabase.from('userinfo').select('username').eq('username', val).maybeSingle();
            
            if (error) {
                console.error("Supabase Error:", error);
                feedback.innerText = "Check connection...";
            } else if (data) {
                feedback.innerText = "Username taken.";
                feedback.style.color = "#ef4444";
                usernameInput.classList.add('input-error');
                usernameInput.classList.remove('input-success');
                submitBtn.disabled = true;
            } else {
                feedback.innerText = "Username available";
                feedback.style.color = "#22c55e";
                usernameInput.classList.remove('input-error');
                usernameInput.classList.add('input-success');
                submitBtn.disabled = false;
            }
        }, 500);
    });

    // Password Logic
    [pass1, pass2].forEach(el => el.addEventListener('input', () => {
        if(pass2.value !== "" && pass1.value !== pass2.value) { 
            passFeed.innerText = "Passwords do not match"; 
            passFeed.style.color = "#ef4444"; 
            submitBtn.disabled = true;
        } else { 
            passFeed.innerText = ""; 
            submitBtn.disabled = false;
        }
    }));

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.innerText = "Registering...";
        const { error } = await supabase.auth.signUp({ 
            email: document.getElementById('email').value, 
            password: pass1.value, 
            options: { 
                data: { 
                    username: usernameInput.value, 
                    telephone: document.getElementById('phone').value 
                } 
            } 
        });
        if(error) { 
            alert(error.message); 
            submitBtn.innerText = "Register Now"; 
        } else { 
            alert("Success! Please verify your email."); 
            form.reset(); 
        }
    });
</script>

</body>
</html>
