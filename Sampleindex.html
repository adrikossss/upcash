<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: sans-serif; }
        /* Glassmorphism */
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px; padding: 2rem; border-radius: 2rem; }
        .status-msg { font-size: 0.75rem; margin-top: 0.25rem; min-height: 1rem; transition: all 0.3s; }
        .input-error { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .input-success { border: 2px solid #22c55e !important; }
    </style>
</head>
<body>

<div class="glass-card shadow-2xl">
    <div class="text-center mb-8">
        <h1 class="text-xl font-bold text-white tracking-wider">UP<span class="text-blue-500">CASH</span></h1>
    </div>

    <form id="signupForm" class="space-y-4">
        <div>
            <input type="text" id="username" required placeholder="Username" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none transition-all">
            <div id="username-feedback" class="status-msg text-slate-400">Special characters, capital letters, dots, or digits are not allowed.</div>
        </div>

        <input type="email" id="email" required placeholder="Email Address" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none focus:border-blue-500">
        <div class="flex items-center bg-slate-900/50 rounded-xl border border-slate-700 overflow-hidden">
            <span class="px-4 py-4 text-white font-medium border-r border-slate-700">🇺🇬 +256</span>
            <input type="tel" id="phone" required placeholder="7XX XXX XXX" class="w-full p-4 bg-transparent text-white outline-none">
        </div>
        <input type="password" id="password" required placeholder="Create Password" class="w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 text-white outline-none focus:border-blue-500">
        <button type="submit" id="submitBtn" class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold hover:opacity-90 transition disabled:opacity-50">Register Now</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');
    const form = document.getElementById('signupForm');
    const usernameInput = document.getElementById('username');
    const feedback = document.getElementById('username-feedback');
    const submitBtn = document.getElementById('submitBtn');
    let debounceTimer;

    usernameInput.addEventListener('input', () => {
        const val = usernameInput.value;
        const isLowercase = /^[a-z]*$/.test(val);

        // Validation for characters
        if (!isLowercase) {
            feedback.innerText = "Only lowercase letters allowed.";
            feedback.style.color = "#ef4444";
            usernameInput.className = "w-full p-4 rounded-xl bg-slate-900/50 border outline-none transition-all input-error";
            submitBtn.disabled = true;
            return;
        }

        // Logic for length
        if (val.length < 4) {
            feedback.innerText = "Special characters, capital letters, dots, or digits are not allowed.";
            feedback.style.color = "#94a3b8";
            usernameInput.className = "w-full p-4 rounded-xl bg-slate-900/50 border border-slate-700 outline-none transition-all";
            submitBtn.disabled = true;
        } else {
            feedback.innerText = "Checking availability...";
            feedback.style.color = "#eab308";
            
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                const { data } = await supabaseClient.from('userinfo').select('username').eq('username', val).maybeSingle();
                if (data) {
                    feedback.innerText = "Username taken already.";
                    feedback.style.color = "#ef4444";
                    usernameInput.className = "w-full p-4 rounded-xl bg-slate-900/50 border outline-none transition-all input-error";
                    submitBtn.disabled = true;
                } else {
                    feedback.innerText = "Username available";
                    feedback.style.color = "#22c55e";
                    usernameInput.className = "w-full p-4 rounded-xl bg-slate-900/50 border outline-none transition-all input-success";
                    submitBtn.disabled = false;
                }
            }, 800);
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.innerText = "Registering...";
        submitBtn.disabled = true;
        
        const { error } = await supabaseClient.auth.signUp({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            options: { data: { username: usernameInput.value, telephone: document.getElementById('phone').value } }
        });

        if (error) { alert("Registration Failed: " + error.message); submitBtn.innerText = "Register Now"; submitBtn.disabled = false; }
        else { alert("Registration successful! Check your email."); form.reset(); }
    });
</script>
</body>
</html>
