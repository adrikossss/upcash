<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            /* Brighter, high-contrast gradient for text */
            --text-gradient: linear-gradient(to right, #00f2fe, #ff00cc);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 400px; position: relative; }

        .back-btn { 
            position: absolute;
            top: 0;
            right: 0;
            font-size: 1.5rem; 
            cursor: pointer; 
            color: white; 
            text-decoration: none;
            opacity: 0.8;
            transition: 0.3s;
        }

        .back-btn:hover { opacity: 1; }

        .profile-card {
            margin-top: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
        }

        .profile-icon-large {
            font-size: 64px;
            margin-bottom: 20px;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username-container {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-group { margin-bottom: 30px; }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-row i { 
            font-size: 18px;
            color: #00f2fe; /* Bright icon color to match */
        }

        .affiliate-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .affiliate-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    
    <div class="profile-card">
        <div class="profile-icon-large"><i class="fas fa-user-circle"></i></div>
        
        <div class="username-container">
            John Doe <i class="fas fa-circle-check" style="color: #ff00cc; font-size: 0.7em;"></i>
        </div>

        <div class="info-group">
            <div class="info-row">
                <i class="fas fa-mobile-alt"></i> 0Phone
            </div>
            <div class="info-row">
                <i class="fas fa-envelope"></i> Email
            </div>
        </div>

        <button class="affiliate-btn" onclick="location.href='affiliate.html'">
            <i class="fas fa-users-cog"></i>  Affiliates
        </button>
    </div>
</div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Initialize using 'supabase'
    const supabase = supabase.createClient(
        'https://wbodpfbmilhperccgzei.supabase.co', 
        'sb_publishable_CTQy3-UTfBu_U8k13IMLXQ_7Ki4guKN'
    );

    async function loadProfile() {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session) {
            window.location.href = 'signin.html';
            return;
        }

        // Use 'supabase' to match the initialized variable name
        const { data, error } = await supabase
            .from('userinfo')
            .select('username, telephone, email')
            .eq('userid', session.user.id)
            .single();

        if (data) {
            // IDs here must match the HTML IDs exactly
            document.getElementById('display-username').innerText = data.username;
            document.getElementById('display-phone').innerText = data.telephone;
            document.getElementById('display-email').innerText = data.email;
        } else if (error) {
            console.error("Error loading profile:", error.message);
        }
    }

    loadProfile();
</script>


</body>
</html>
