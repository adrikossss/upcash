<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Network | UPCASH</title>
    <style>
        :root { --grad-start: #3b82f6; --grad-end: #8b5cf6; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        
        .glass-container {
            max-width: 500px; margin: 0 auto; background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-circle { 
            width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none; color: white;
        }

        .affiliate-section {
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        
        /* Professional solid text */
        .affiliate-text { font-weight: 700; color: #ffffff; font-size: 1.1rem; }

        /* Invite Button Styling */
        .invite-btn {
            width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
            color: white; font-weight: 600; display: flex; align-items: center; justify-content: center;
            gap: 10px; cursor: pointer; transition: opacity 0.2s;
        }

        .loading-container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .icon-box {
            width: 50px; height: 50px; background-color: #3b82f6;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .rotating-arrow {
            width: 25px; height: 25px; stroke: white;
            animation: rotate-center 2s linear infinite; transform-origin: center;
        }
        @keyframes rotate-center { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .referral-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 35px; height: 35px; background: linear-gradient(135deg, var(--grad-start), var(--grad-end)); border-radius: 10px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        
        footer { text-align: center; color: #64748b; font-size: 10px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <a href="profile.html" class="back-circle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
    </div>

    <div class="affiliate-section">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        <span class="affiliate-text">Affiliate Network</span>
    </div>

    <div id="network-list">
        <div class="loading-container">
            <div class="icon-box">
                <svg class="rotating-arrow" viewBox="0 0 24 24" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 6L13.5 15.5 8.5 10.5 1 18" />
                    <path d="M17 6h6v6" />
                </svg>
            </div>
            <p style="margin-top: 15px; color: #94a3b8; font-size: 12px;">Initializing network data...</p>
        </div>
    </div>

    <footer>&copy; UPCASH BUSINESS PLATFORM 2026</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');
    let userUsername = "";

    async function loadNetwork() {
        const container = document.getElementById('network-list');
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        if (!user) { container.innerHTML = '<p style="text-align:center;">Please log in.</p>'; return; }

        const { data: profile } = await supabaseClient.from('userinfo').select('username').eq('userid', user.id).single();
        userUsername = profile.username;
        const { data: affiliates } = await supabaseClient.from('userinfo').select('username, created_at').eq('referred_by', userUsername);

        if (!affiliates || affiliates.length === 0) {
            container.innerHTML = `
                <p style="text-align:center; color:#64748b; margin-top:20px;">No affiliates found.</p>
                <button class="invite-btn" onclick="shareReferral()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    Invite Friends
                </button>
            `;
        } else {
            container.innerHTML = affiliates.map(aff => `
                <div class="referral-item">
                    <div class="avatar">${aff.username[0].toUpperCase()}</div>
                    <div style="flex-grow:1;">
                        <h4 style="margin:0; font-size:14px;">${aff.username}</h4>
                        <p style="margin:0; font-size:10px; color:#64748b;">Direct Referral</p>
                    </div>
                    <div style="font-size:11px; color:#475569;">${new Date(aff.created_at).toLocaleDateString()}</div>
                </div>
            `).join('') + `
                <button class="invite-btn" onclick="shareReferral()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    Invite Friends
                </button>
            `;
        }
    }

    function shareReferral() {
        const link = `https://adrikossss.github.io/upcash/register?ref=${userUsername}`;
        if (navigator.share) {
            navigator.share({ title: 'Join UPCASH Business Platform', text: 'Start earning with UPCASH! Automated Instant Withdraws and Deposits Join via my link:', url: link });
        } else {
            navigator.clipboard.writeText(link);
            alert("Referral link copied!");
        }
    }

    loadNetwork();
</script>
</body>
</html>
