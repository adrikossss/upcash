<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Network | UPCASH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --grad-start: #3b82f6; --grad-end: #8b5cf6; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f172a; 
            color: white; 
            margin: 0; 
            padding: 20px; 
            -webkit-font-smoothing: antialiased;
        }
        
        .glass-container {
            max-width: 500px; margin: 0 auto; background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-circle { 
            width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none; color: white; transition: background 0.2s;
        }
        .back-circle:hover { background: rgba(255,255,255,0.1); }

        .affiliate-section {
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        
        .affiliate-text { font-weight: 700; color: #ffffff; font-size: 1.1rem; }

        .invite-btn {
            width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
            color: white; font-weight: 600; display: flex; align-items: center; justify-content: center;
            gap: 10px; cursor: pointer; transition: opacity 0.2s;
        }
        .invite-btn:hover { opacity: 0.9; }

        .loading-container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .icon-box {
            width: 50px; height: 50px; background-color: #3b82f6;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .rotating-arrow {
            width: 25px; height: 25px; stroke: white;
            animation: rotate-center 2s linear infinite; transform-origin: center;
        }
        @keyframes rotate-center { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .referral-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 35px; height: 35px; background: linear-gradient(135deg, var(--grad-start), var(--grad-end)); border-radius: 10px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
        
        footer { text-align: center; color: #64748b; font-size: 10px; margin-top: 30px; letter-spacing: 0.05em; }
    </style>
</head>
